name: LLM YouTube Tracker Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Verify files exist
      run: |
        echo "=== Checking files ==="
        pwd
        ls -la
        echo "=== requirements-minimal.txt ==="
        cat requirements-minimal.txt || echo "FILE NOT FOUND!"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-minimal.txt
        
    - name: Create data directory
      run: mkdir -p data public/data
      
    - name: Run data pipeline
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python run_pipeline_standalone.py
      continue-on-error: true
        
    - name: Generate static report
      run: python generate_static_report.py
      continue-on-error: true
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './public'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
