name: Deploy LLM Tracker

on:
  workflow_dispatch:
  push:
    branches: [main] 
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install
      run: pip install youtube-transcript-api requests python-dotenv sqlalchemy
    
    - name: Run Pipeline
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: |
        mkdir -p data
        python run_pipeline_standalone.py || true
        python generate_static_report.py || true
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        publish_branch: gh-pages
        force_orphan: true
