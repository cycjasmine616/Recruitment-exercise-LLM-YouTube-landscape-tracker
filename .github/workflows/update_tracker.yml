name: Update LLM YouTube Tracker

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run watcher script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -f "index.html" ]; then git add index.html; fi
          if [ -f "tracker_data.csv" ]; then git add tracker_data.csv; fi
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update tracker data"
            git push
          else
            echo "No new videos found, nothing to commit."
          fi
